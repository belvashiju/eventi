<h2>My Bookings</h2>
<div class="alert alert-info text-center" ng-if="bookings.length == 0">No reservations made.</div>
<div class="card shadow-sm" ng-if="bookings.length > 0">
    <table class="table mb-0">
        <thead class="thead-dark">
            <tr>
                <th>ID</th><th>Event Name</th><th>Date</th><th>Tickets</th><th>Total</th><th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="b in bookings">
                <td class="font-weight-bold text-primary">{{b.id}}</td>
                <td>{{b.eventName}}</td>
                <td>{{b.eventDate | date:'mediumDate'}}</td>
                <td>{{b.tickets}}</td>
                <td>{{b.total | currency:"₹ "}}</td>
                <td><button class="btn btn-danger btn-sm" ng-click="cancel(b)">Cancel</button></td>
            </tr>
        </tbody>
    </table>
</div>
